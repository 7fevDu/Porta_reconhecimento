paths:
  users_dir: "data_base/users"
  embeddings_dir: "data_base/embeddings"
  metadata_file: "metadata.json"
  mediapipe_model: "models/face_landmarker.task"

model:
  facenet: "Facenet512"
  detector_backend: "opencv"
  distance_threshold: 0.40
  confidence_threshold: 60.0

camera:
  index: 1
  width: 640
  height: 480

door:
  serial_port: "COM3"
  baudrate: 9600
  open_seconds: 5

liveness:
  eye_blink_threshold: 0.20
  blinks_required: 2

web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  min_photos: 20
  target_photos: 30
